<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ฟอร์มบันทึกข้อมูลนักเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">ฟอร์มบันทึกข้อมูลนักเรียน</h4>
                    </div>
                    <div class="card-body">
                        <form id="studentForm">
                            
                            <div class="mb-3">
                                <label for="prefix" class="form-label">คำนำหน้าชื่อ</label>
                                <select class="form-select" id="prefix" required>
                                    <option value="" disabled selected>เลือกคำนำหน้าชื่อ</option>
                                    <option value="เด็กชาย">เด็กชาย</option>
                                    <option value="เด็กหญิง">เด็กหญิง</option>
                                    <option value="นาย">นาย</option>
                                    <option value="นางสาว">นางสาว</option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">ชื่อ</label>
                                    <input type="text" class="form-control" id="firstName" placeholder="ชื่อจริง" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">นามสกุล</label>
                                    <input type="text" class="form-control" id="lastName" placeholder="นามสกุล" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="grade" class="form-label">ชั้นมัธยมศึกษาปีที่</label>
                                    <select class="form-select" id="grade" required>
                                        <option value="" disabled selected>เลือกชั้น</option>
                                        <option value="1">ม.1</option>
                                        <option value="2">ม.2</option>
                                        <option value="3">ม.3</option>
                                        <option value="4">ม.4</option>
                                        <option value="5">ม.5</option>
                                        <option value="6">ม.6</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="room" class="form-label">ห้อง</label>
                                    <input type="number" class="form-control" id="room" placeholder="เช่น 1" min="1" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="number" class="form-label">เลขที่</label>
                                    <input type="number" class="form-control" id="number" placeholder="เช่น 25" min="1" required>
                                </div>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">บันทึกข้อมูล</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        $(document).ready(function() {
            // เมื่อมีการกดปุ่ม Submit ฟอร์ม
            $('#studentForm').on('submit', function(e) {
                e.preventDefault(); // ป้องกันการรีเฟรชหน้าจอของฟอร์มเดิม

                // 1. แสดง SweetAlert สถานะกำลังโหลด/กำลังบันทึกข้อมูล
                Swal.fire({
                    title: 'กำลังบันทึกข้อมูล...',
                    text: 'กรุณารอสักครู่ ระบบกำลังนำส่งข้อมูลไปยัง Google Sheets',
                    allowOutsideClick: false, // ห้ามคลิกพื้นที่ด้านนอกเพื่อปิด
                    didOpen: () => {
                        Swal.showLoading(); // แสดงไอคอนหมุนโหลด (Loading)
                    }
                });

                // URL ของ Google Apps Script Web App ที่ให้มา
                const webAppUrl = "https://script.google.com/macros/s/AKfycbwpXjw3qQIYDn3MIC8sLtE8rea_mb-K_aUKpidgkhNaCwOdKW20tHTWhxeKeN648nPD/exec";

                // ดึงค่าจากช่องกรอกต่างๆ มารวมใน Object
                const formData = {
                    prefix: $('#prefix').val(),
                    firstName: $('#firstName').val(),
                    lastName: $('#lastName').val(),
                    grade: $('#grade').val(),
                    room: $('#room').val(),
                    number: $('#number').val()
                };

                // 2. ส่งข้อมูลด้วย Ajax วิธี JSONP (หลีกเลี่ยงปัญหา CORS)
                $.ajax({
                    url: webAppUrl,
                    dataType: "jsonp",       // กำหนดประเภทข้อมูลเป็น jsonp
                    jsonp: "callback",       // ชื่อ Parameter ที่ส่งไปบอกหลังบ้านให้เรียกฟังก์ชันกลับ
                    data: formData,          // ส่งก้อนข้อมูลไปด้วย
                    success: function(response) {
                        // เมื่อแอปสคริปต์ตอบกลับมาสำเร็จ
                        if (response.status === 'success') {
                            // 3. แสดง SweetAlert บันทึกสำเร็จ
                            Swal.fire({
                                icon: 'success',
                                title: 'บันทึกสำเร็จ!',
                                text: 'ข้อมูลของท่านถูกบันทึกลงในระบบเรียบร้อยแล้ว',
                                confirmButtonText: 'ตกลง'
                            });
                            $('#studentForm')[0].reset(); // เคลียร์ข้อมูลในฟอร์มออกหลังจากบันทึกเสร็จ
                        } else {
                            // กรณีหลังบ้านแจ้ง Error กลับมา
                            Swal.fire({
                                icon: 'error',
                                title: 'เกิดข้อผิดพลาด',
                                text: response.message
                            });
                        }
                    },
                    error: function(xhr, status, error) {
                        // กรณีเชื่อมต่อเซิร์ฟเวอร์ไม่ได้ หรือสคริปต์ปลายทางทำงานผิดพลาด
                        Swal.fire({
                            icon: 'error',
                            title: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้',
                            text: 'กรุณาตรวจสอบการตั้งค่า Web App หรืออินเทอร์เน็ตของคุณ'
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
